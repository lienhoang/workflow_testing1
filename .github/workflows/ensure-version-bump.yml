name: Verify Version Bump

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch-name:
        type: string
        description: "Set the branch name to run on"
        required: true

jobs:
  version-check:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Get base branch version
          id: base
          run: |
            git show origin/${{ github.base_ref }}:pyproject.toml > base.toml
            BASE_VERSION=$(grep '^version' base.toml | sed 's/version *= *"//;s/"//')
            echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT

        - name: Get PR version
          id: pr
          run: |
            PR_VERSION=$(grep '^version' pyproject.toml | sed 's/version *= *"//;s/"//')
            echo "pr_version=$PR_VERSION" >> $GITHUB_OUTPUT

        - name: Compare versions
          run: |
            if [ "${{ steps.base.outputs.base_version }}" = "${{ steps.pr.outputs.pr_version }}" ]; then
              echo "::warning::Version in pyproject.toml has not been incremented!"
              exit 1
            else
              echo "✅ Version increment detected: ${{ steps.base.outputs.base_version }} → ${{ steps.pr.outputs.pr_version }}"
            fi
