name: Verify Version Bump

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch-name:
        type: string
        description: "Set the branch name to run on"
        required: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version file changed
        id: changed-files
        run: |
          if git diff --name-only origin/main...HEAD | grep -q 'pyproject.toml'; then
            echo "Version number has been updated"
          else
            echo "Error: You. must bump the version number before merging!"
            exit 1
          fi
