name: Verify Version Bump

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch-name:
        type: string
        description: "Set the branch name to run on"
        required: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4

      - name: Get PR Version
        id: pr_version
        run: |
          VERSION=$(grep -m 1 '^version' pyproject.toml | tr -d '"' | tr -d "'" | awk '{print $3}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout Target Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Get Target Branch Version
        id: target_version
        run: |
          VERSION=$(grep -m 1 '^version' pyproject.toml | tr -d '"' | tr -d "'" | awk '{print $3}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compare Versions
        run: |
          PR_VER="${{ steps.pr_version.outputs.version }}"
          TARGET_VER="${{ steps.target_version.outputs.version }}"
          
          echo "PR Version: $PR_VER"
          echo "Target Version: $TARGET_VER"
          
          if [ "$PR_VER" = "$TARGET_VER" ]; then
            echo "Error: You must bump the version in pyproject.toml before merging."
            exit 1
          fi
