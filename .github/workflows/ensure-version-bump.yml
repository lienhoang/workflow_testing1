name: Verify Version Bump

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch-name:
        type: string
        description: "Set the branch name to run on"
        required: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4

      - name: Get PR Version
        id: pr_version
        run: |
          PR_VERSION=$(grep -m 1 '^version' pyproject.toml | tr -d '"' | tr -d "'" | awk '{print $3}')
          echo "version=$PR_VERSION" >> $GITHUB_OUTPUT

      - name: Checkout base Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Get base branch version
        id: base_version
        run: |
          BASE_VERSION=$(grep -m 1 '^version' pyproject.toml | tr -d '"' | tr -d "'" | awk '{print $3}')
          echo "version=$BASE_VERSION" >> $GITHUB_OUTPUT

      - name: Compare Versions
        run: |
          PR_VERSION="${{ steps.pr_version.outputs.version }}"
          BASE_VERSION="${{ steps.base_version.outputs.version }}"
          
          echo "PR Version: $PR_VERSION"
          echo "Base Version: $BASE_VERSION"

          # 1. Check if versions are identical
          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "Error: You must bump the version in pyproject.toml before merging."
            exit 1
          fi

          # 2. Check if PR version is lower than base version
          LOWEST_VERSION=$(printf '%s\n%s' "$PR_VERSION" "$BASE_VERSION" | sort -V | head -n1)
          if [ "$LOWEST_VERSION" = "$PR_VERSION" ]; then
            echo "::error::PR Version ($PR_VERSION) cannot be lower than Base Version ($BASE_VERSION)."
            exit 1
          fi

          # 3. Check if PR version is too high (Skipping versions)
          # Extract major and minor numbers using cut
          BASE_MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
          BASE_MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
          
          PR_MAJOR=$(echo "$PR_VERSION" | cut -d. -f1)
          PR_MINOR=$(echo "$PR_VERSION" | cut -d. -f2)

          # Calculate differences
          MAJOR_DIFF=$((PR_MAJOR - BASE_MAJOR))
          MINOR_DIFF=$((PR_MINOR - BASE_MINOR))

          # Error if major skips by 2+ or minor skips by 2+ when major stays same
          if [ "$MAJOR_DIFF" -gt 1 ] || { [ "$MAJOR_DIFF" -eq 0 ] && [ "$MINOR_DIFF" -gt 1 ]; }; then
            echo "::error::PR Version ($PR_VERSION) is too high. You skipped a major or minor version relative to Base ($BASE_VERSION)."
            exit 1
          fi
               